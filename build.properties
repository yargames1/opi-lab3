# Source directories
src.dir=src/main/java
resources.dir=src/main/resources
web.dir=src/main/webapp
test.dir=src/test/java

# Build directories
build.dir=build
classes.dir=${build.dir}/classes
test.classes.dir=${build.dir}/test-classes

# Distribution
dist.dir=dist
war.name=lab3.war

# Libraries
lib.dir=lib

# Manifest
manifest.file=MANIFEST.MF

# Java version
java.version=17

# Music - success & failure
music.success.file=success.mp3
music.failure.file=failure.mp3

# Message - text on success / failure
message.success.text="Build completed successfully!"
message.failure.text="Build failed!"

# Git tracked classes
git.classes=PointResult.java,ResultsBean.java